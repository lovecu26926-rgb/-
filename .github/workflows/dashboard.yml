name: Market Dashboard

on:
  schedule:
    # 미국 동부 기준 16:30 실행 (서머타임/동계 대응)
    # UTC 20:30 = 미국 동부 16:30 (서머타임, 3월~11월)
    - cron: '30 20 * * 1-5'
    # UTC 21:30 = 미국 동부 16:30 (동계, 11월~3월)
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install yfinance requests pytz numpy pandas

      - name: Run dashboard
        run: python market_dashboard.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
