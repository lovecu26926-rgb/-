name: US Market Session Scanner (KST Schedule)

on:
  push:
    branches: [ main ]
  
  schedule:
    # ① 장전 데이터 (전일 종가 기준) - 한국 오후 2시
    - cron: '0 5 * * 1-5'
      timezone: 'Asia/Seoul'
    
    # ② 미국 장 시작 직후 - 한국 밤 11시 30분
    - cron: '30 14 * * 1-5'
      timezone: 'Asia/Seoul'
    
    # ③ 미국 장중 - 한국 새벽 2시
    - cron: '0 17 * * 1-5'
      timezone: 'Asia/Seoul'
    
    # ④ 미국 장 마감 1시간 전 - 한국 새벽 5시 (🔧 수정됨)
    - cron: '0 20 * * 1-5'
      timezone: 'Asia/Seoul'
  
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests pytz

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py
