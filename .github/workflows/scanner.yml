name: Closing Briefing Scanner

on:
  # 🔥 코드를 푸시(Push)할 때마다 자동 실행 (테스트용)
  push:
    branches: [ main ]
  
  # 🔥 매일 한국 시간 오후 2시 (UTC 05:00) - 평일(월~금)만 실행
  schedule:
    - cron: '0 5 * * 1-5'
  
  # 🔥 수동 실행 버튼 (Actions 탭에서 직접 실행 가능)
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests pytz

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py
