name: US Market Session Scanner (KST Schedule)

on:
  push:
    branches: [ main ]
  schedule:
    # ① 장전 (14:00 KST = 05:00 UTC)
    - cron: '0 5 * * 1-5'

    # ② 장시작 (23:30 KST = 14:30 UTC)
    - cron: '30 14 * * 1-5'

    # ③ 장중 (01:30 KST = 16:30 UTC)
    - cron: '30 16 * * 1-5'

    # ④ 장중 (03:30 KST = 18:30 UTC)
    - cron: '30 18 * * 1-5'

    # ⑤ 장마감 1시간 전 (05:00 KST = 20:00 UTC)
    - cron: '0 20 * * 1-5'

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas numpy requests

      - name: Run scanner
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python scanner.py
