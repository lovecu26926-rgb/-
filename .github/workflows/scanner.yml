name: Stock Scanner

on:
  schedule:
    - cron: '30 13 * * 1-5'
    - cron: '30 14 * * 1-5'
    - cron: '30 15 * * 1-5'
    - cron: '30 16 * * 1-5'
    - cron: '30 17 * * 1-5'
    - cron: '30 18 * * 1-5'
    - cron: '30 19 * * 1-5'
    - cron: '30 20 * * 1-5'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore signals cache
        uses: actions/cache@v3
        with:
          path: sent_signals.json
          key: signals-${{ github.run_id }}
          restore-keys: |
            signals-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - run: pip install yfinance requests pytz lxml html5lib numpy pandas

      - run: python Supertrend_bot.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Save signals cache
        if: always()
        uses: actions/cache@v3
        with:
          path: sent_signals.json
          key: signals-${{ github.run_id }}
